<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar__left">
    <a routerLink="/home" class="navbar__logo"><span class="logo-text">CINELOG</span></a>
    <ul class="navbar__links" [class.open]="menuOpen()">
      <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a></li>
      <li><a routerLink="/home" [queryParams]="{tipo:'Peliculas'}">Peliculas</a></li>
      <li><a routerLink="/home" [queryParams]="{tipo:'Series'}">Series</a></li>
      <li *ngIf="auth.isLoggedIn()"><a routerLink="/mis-listas" routerLinkActive="active">Mis Listas</a></li>
      <li *ngIf="auth.isLoggedIn()"><a routerLink="/mis-finales" routerLinkActive="active">Mis Finales</a></li>
    </ul>
  </div>
  <div class="navbar__right">
    <div class="search-container" [class.open]="searchOpen()">
      <button class="btn-icon" (click)="toggleSearch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
      <input *ngIf="searchOpen()" type="text" [(ngModel)]="searchQuery"
             (keyup)="onSearch($event)" placeholder="Buscar titulos..." autofocus class="search-input" />
    </div>
    <ng-container *ngIf="auth.isLoggedIn(); else loginBtn">
      <div class="user-menu">
        <button class="user-avatar" (click)="toggleMenu()">
          {{ auth.usuario()?.nombre_usuario?.charAt(0)?.toUpperCase() }}
        </button>
        <div class="user-dropdown" *ngIf="menuOpen()">
          <div class="user-info">
            <strong>{{ auth.usuario()?.nombre_usuario }}</strong>
            <span>{{ auth.usuario()?.correo_electronico }}</span>
          </div>
          <hr>
          <a routerLink="/mis-listas" (click)="closeMenu()">Mis Listas</a>
          <a routerLink="/mis-finales" (click)="closeMenu()">Mis Finales</a>
          <hr>
          <button (click)="logout()" class="logout-btn">Cerrar sesion</button>
        </div>
      </div>
    </ng-container>
    <ng-template #loginBtn>
      <a routerLink="/login" class="btn btn-primary" style="font-size:13px;padding:8px 18px">Iniciar sesion</a>
    </ng-template>
    <button class="mobile-toggle btn-icon" (click)="toggleMenu()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</nav>
<div class="navbar-spacer"></div>
